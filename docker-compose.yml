version: "3.9"

services:
  # ─── GUI Server (Bun) ──────────────────────────────────────────────
  gui:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chroma:8000
      - CRESCENT_CITY_API_KEY=${CRESCENT_CITY_API_KEY:-dev-key-12345}
      - AIRNOW_API_KEY=${AIRNOW_API_KEY:-}
    volumes:
      - ./output:/app/output
    depends_on:
      - ollama
      - chroma
    restart: unless-stopped

  # ─── Ollama (LLM inference) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support — uncomment if NVIDIA GPU available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── ChromaDB (vector store) ───────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
