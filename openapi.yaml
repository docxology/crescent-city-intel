openapi: 3.0.3
info:
  title: Crescent City Intelligence API
  description: REST API for accessing Crescent City, CA municipal code and intelligence system
  version: 2.2.0
  contact:
    name: Crescent City Intelligence Platform
    url: https://github.com/docxology/crescent-city-intel
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://api.crescentcity.ca.gov
    description: Production server
paths:
  /api/toc:
    get:
      summary: Get table of contents for municipal code
      description: Returns the hierarchical table of contents for the municipal code
      operationId: getTableOfContents
      tags:
        - Municipal Code
      responses:
        '200':
          description: Successful retrieval of table of contents
          content:
            application/json:
              schema:
                type: object
                properties:
                  municipality:
                    type: string
                    example: "Crescent City"
                  lastUpdated:
                    type: string
                    format: date-time
                    example: "2026-03-13T10:30:00Z"
                  toc:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        guid:
                          type: string
                        children:
                          type: array
                          items:
                            $ref: '#/components/schemas/TocItem'
        '404':
          description: Table of contents not found - scraper needs to be run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/article/{guid}:
    get:
      summary: Get a specific article by GUID
      description: Returns the full text and metadata for a municipal code article
      operationId: getArticleByGuid
      tags:
        - Municipal Code
      parameters:
        - in: path
          name: guid
          required: true
          schema:
            type: string
          description: The GUID of the article to retrieve
      responses:
        '200':
          description: Successful retrieval of article
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleResponse'
        '404':
          description: Article not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/section/{guid}:
    get:
      summary: Get a specific section by GUID
      description: Returns the full text and metadata for a municipal code section
      operationId: getSectionByGuid
      tags:
        - Municipal Code
      parameters:
        - in: path
          name: guid
          required: true
          schema:
            type: string
          description: The GUID of the section to retrieve
      responses:
        '200':
          description: Successful retrieval of section
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionResponse'
        '404':
          description: Section not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/search:
    get:
      summary: Search municipal code
      description: Search for sections or articles matching a query string
      operationId: searchMunicipalCode
      tags:
        - Search
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Search query string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum number of results to return
      responses:
        '200':
          description: Successful search
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchResult'
        '400':
          description: Bad request - missing query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/stats:
    get:
      summary: Get municipal code statistics
      description: Returns statistics about the municipal code database
      operationId: getMunicipalCodeStats
      tags:
        - Statistics
      responses:
        '200':
          description: Successful retrieval of statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
        '404':
          description: Manifest not found - scraper needs to be run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/chat:
    get:
      summary: Query the municipal code using RAG
      description: Ask a question about the municipal code and get an AI-generated answer with sources
      operationId: chatWithMunicipalCode
      tags:
        - AI / RAG
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Question to ask about the municipal code
      responses:
        '200':
          description: Successful chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Bad request - missing question parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable - LLM or database not running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/analytics/stats:
    get:
      summary: Get municipal code analytics statistics
      description: Returns detailed analytics about the municipal code content
      operationId: getAnalyticsStats
      tags:
        - Analytics
      responses:
        '200':
          description: Successful retrieval of analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsStatsResponse'
        '503':
          description: Service unavailable - analytics modules not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/analytics/embeddings:
    get:
      summary: Get embedding projections for visualization
      description: Returns PCA projection of municipal code embeddings for visualization
      operationId: getEmbeddingProjection
      tags:
        - Analytics
      responses:
        '200':
          description: Successful retrieval of embedding projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingProjectionResponse'
        '503':
          description: Service unavailable - analytics modules not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/summarize:
    post:
      summary: Summarize municipal code text
      description: Generate a comprehensive summary of provided municipal code text
      operationId: summarizeMunicipalCode
      tags:
        - AI / Summarization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: The municipal code text to summarize
                number:
                  type: string
                  description: Section number (e.g., "8.04.010")
                title:
                  type: string
                  description: Section title
      responses:
        '200':
          description: Successful summarization
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string
                  model:
                    type: string
                    example: "hunter-alpha"
        '400':
          description: Bad request - missing text parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable - LLM modules not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/domains:
    get:
      summary: Get all intelligence domains
      description: Returns a list of all intelligence domains with summary information
      operationId: getIntelligenceDomains
      tags:
        - Intelligence Domains
      responses:
        '200':
          description: Successful retrieval of domains
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/DomainSummary'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/domain/{id}:
    get:
      summary: Get a specific intelligence domain
      description: Returns detailed information about a specific intelligence domain
      operationId: getIntelligenceDomainById
      tags:
        - Intelligence Domains
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The ID of the domain to retrieve
      responses:
        '200':
          description: Successful retrieval of domain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainDetail'
        '404':
          description: Domain not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/domains/search:
    get:
      summary: Search intelligence domains
      description: Search across intelligence domains by query string
      operationId: searchIntelligenceDomains
      tags:
        - Intelligence Domains
        - Search
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Search query string
      responses:
        '200':
          description: Successful search
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                  count:
                    type: integer
                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/DomainSummary'
        '400':
          description: Bad request - missing query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/monitor/status:
    get:
      summary: Get last monitoring report
      description: Returns the status of the last municipal code monitoring run
      operationId: getMonitorStatus
      tags:
        - Monitoring
      responses:
        '200':
          description: Successful retrieval of monitor status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorStatusResponse'
        '404':
          description: No monitor report found - monitor needs to be run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sections:
    get:
      summary: List sections with hierarchical filters
      description: Returns sections filtered by title and/or chapter number.
      operationId: listSections
      tags: [Municipal Code]
      parameters:
        - {in: query, name: title, schema: {type: string}, description: "Title number e.g. '17'"}
        - {in: query, name: chapter, schema: {type: string}, description: "Chapter number e.g. '04'"}
        - {in: query, name: limit, schema: {type: integer, default: 100}}
        - {in: query, name: offset, schema: {type: integer, default: 0}}
      responses:
        '200':
          description: Filtered list of sections
          content:
            application/json:
              schema:
                type: object
                properties:
                  sections: {type: array, items: {type: object}}
                  total: {type: integer}
                  offset: {type: integer}
                  limit: {type: integer}
  /api/domain/{id}/sections:
    get:
      summary: Get code sections for an intelligence domain
      description: Returns all municipal code sections cross-referenced by a specific domain.
      operationId: getDomainSections
      tags: [Intelligence Domains]
      parameters:
        - {in: path, name: id, required: true, schema: {type: string}}
      responses:
        '200':
          description: Domain section cross-references
          content:
            application/json:
              schema:
                type: object
                properties:
                  domainId: {type: string}
                  domainName: {type: string}
                  sectionRefs: {type: array, items: {type: string}}
        '404': {description: Domain not found}
  /api/monitor/history:
    get:
      summary: Get monitor run history
      description: Returns chronological history from output/monitor-history.jsonl (most recent first).
      operationId: getMonitorHistory
      tags: [Monitoring]
      parameters:
        - {in: query, name: limit, schema: {type: integer, default: 20}}
      responses:
        '200':
          description: Monitor history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp: {type: string, format: date-time}
                        overallStatus: {type: string, enum: [clean, changed, error]}
        '404': {description: No history yet}
  /api/monitor/alerts:
    get:
      summary: Aggregated real-time hazard alert status
      description: Returns latest status from all 5 monitors (tsunami, earthquake, weather, tides, fishing).
      operationId: getMonitorAlerts
      tags: [Monitoring, Alerts]
      responses:
        '200':
          description: Aggregated alert status
          content:
            application/json:
              schema:
                type: object
                properties:
                  fetchedAt: {type: string, format: date-time}
                  alerts:
                    type: object
                    properties:
                      tsunami: {type: object, properties: {status: {type: string}, count: {type: integer}}}
                      earthquake: {type: object, properties: {status: {type: string}, count: {type: integer}}}
                      weather: {type: object, properties: {status: {type: string}, count: {type: integer}}}
                      tides: {type: object, properties: {status: {type: string}, waterLevel: {type: number}}}
                      fishing: {type: object, properties: {status: {type: string}}}
  /api/readability:
    get:
      summary: Flesch-Kincaid readability scores for all code sections
      description: Returns grade level and reading ease for all 2,194 sections. Computed on demand or served from cache.
      operationId: getReadability
      tags: [Analytics]
      responses:
        '200':
          description: Readability analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  computedAt: {type: string, format: date-time}
                  totalSections: {type: integer}
                  scored: {type: integer}
                  averageGradeLevel: {type: number}
                  hardestSections: {type: array, items: {type: object}}
                  easiestSections: {type: array, items: {type: object}}
  /api/domains/coverage:
    get:
      summary: Domain coverage metrics
      description: Percentage of sections cross-referenced by each intelligence domain using prefix matching.
      operationId: getDomainsCoverage
      tags: [Intelligence Domains, Analytics]
      responses:
        '200':
          description: Domain coverage report
          content:
            application/json:
              schema:
                type: object
                properties:
                  computedAt: {type: string, format: date-time}
                  totalSections: {type: integer}
                  coveredSections: {type: integer}
                  overallCoveragePct: {type: number}
                  domains:
                    type: array
                    items:
                      type: object
                      properties:
                        domainId: {type: string}
                        domainName: {type: string}
                        referencedCount: {type: integer}
                        coveragePct: {type: number}
  /api/health:
    get:
      summary: Server health check
      description: Returns server status and timestamp. No authentication required.
      operationId: getHealth
      tags: [System]
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: ok}
                  timestamp: {type: string, format: date-time}
  /api/stats/count:
    get:
      summary: Lightweight section count
      description: Returns only the section count from the manifest without loading all sections. For health checks and status polling.
      operationId: getSectionCount
      tags: [Statistics]
      responses:
        '200':
          description: Section count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: {type: integer, example: 2194}
        '404': {description: Manifest not found}

  # ─── v2.0 Intelligence Endpoints ──────────────────────────────────

  /api/history/{guid}:
    get:
      summary: Legislative history for a section
      description: Parses the legislative history field of a section into structured ordinance chain entries.
      operationId: getSectionHistory
      tags: [Structured Queries]
      parameters:
        - name: guid
          in: path
          required: true
          schema: {type: string}
          description: Section GUID
      responses:
        '200':
          description: Legislative history with parsed ordinance entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid: {type: string}
                  number: {type: string}
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        ordinance: {type: string, example: "Ord. No. 942"}
                        action: {type: string, example: "amended"}
                        date: {type: string, nullable: true, example: "2011"}
                        raw: {type: string}
                  rawHistory: {type: string}
        '404': {description: Section not found}

  /api/compare:
    get:
      summary: Compare two sections
      description: Word-level diff between two sections, returning lines unique to each, common lines, and a similarity score.
      operationId: compareSections
      tags: [Structured Queries]
      parameters:
        - name: guid1
          in: query
          required: true
          schema: {type: string}
        - name: guid2
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Section comparison result
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid1: {type: string}
                  guid2: {type: string}
                  number1: {type: string}
                  number2: {type: string}
                  wordCountDelta: {type: integer}
                  onlyInFirst: {type: array, items: {type: string}}
                  onlyInSecond: {type: array, items: {type: string}}
                  common: {type: array, items: {type: string}}
                  similarity: {type: number, format: float}

  /api/similar/{guid}:
    get:
      summary: Find semantically similar sections
      description: Returns sections similar to the given one using cosine-similarity term overlap with a same-title boost.
      operationId: findSimilarSections
      tags: [Structured Queries]
      parameters:
        - name: guid
          in: path
          required: true
          schema: {type: string}
        - name: limit
          in: query
          required: false
          schema: {type: integer, default: 10}
      responses:
        '200':
          description: Similar sections with scores
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid: {type: string}
                  limit: {type: integer}
                  count: {type: integer}
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        score: {type: number}
                        reason: {type: string}

  /api/citations/{guid}:
    get:
      summary: Extract legal citations from a section
      description: Parses section text for California Code, U.S.C., case law, and ordinance amendment citations.
      operationId: extractCitations
      tags: [Legal Analysis]
      parameters:
        - name: guid
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Extracted citations and ordinance amendments
          content:
            application/json:
              schema:
                type: object
                properties:
                  guid: {type: string}
                  number: {type: string}
                  citations:
                    type: array
                    items:
                      type: object
                      properties:
                        citation: {type: string}
                        type: {type: string, enum: [ca-code, federal, case-law, ordinance]}
                        codeName: {type: string, nullable: true}
                        section: {type: string, nullable: true}
                  amendments:
                    type: array
                    items:
                      type: object
                      properties:
                        ordinance: {type: string}
                        action: {type: string}
                        year: {type: integer, nullable: true}

  /api/glossary:
    get:
      summary: Definition glossary
      description: Extracts defined terms from the entire code corpus using legal definition patterns ("shall mean", "means", "is defined as").
      operationId: getGlossary
      tags: [Legal Analysis]
      responses:
        '200':
          description: Glossary entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: {type: integer}
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        term: {type: string}
                        definition: {type: string}
                        sectionNumber: {type: string}

  /api/cross-refs/validate:
    get:
      summary: Validate all internal cross-references
      description: Checks every section reference (§ X.XX.XXX) in the code against actual sections. Returns resolution rate and unresolved references.
      operationId: validateCrossReferences
      tags: [Legal Analysis]
      responses:
        '200':
          description: Cross-reference validation report
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalReferences: {type: integer}
                  resolvedCount: {type: integer}
                  unresolvedCount: {type: integer}
                  resolutionRate: {type: number, format: float}
                  unresolved:
                    type: array
                    items:
                      type: object
                      properties:
                        sectionNumber: {type: string}
                        citation: {type: string}
                        sectionGuid: {type: string}

  /api/alerts/timeline:
    get:
      summary: Unified alert event timeline
      description: Aggregates all alert events across all 8 monitor types into a single chronological timeline with per-type statistics.
      operationId: getAlertTimeline
      tags: [Alert Analytics]
      responses:
        '200':
          description: Alert analytics report
          content:
            application/json:
              schema:
                type: object
                properties:
                  generatedAt: {type: string, format: date-time}
                  totalEvents: {type: integer}
                  timeline:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp: {type: string, format: date-time}
                        type: {type: string}
                        severity: {type: string}
                        description: {type: string}
                  typeStats:
                    type: array
                    items:
                      type: object
                      properties:
                        type: {type: string}
                        totalEvents: {type: integer}
                        avgPerDay: {type: number}

  /api/alerts/recent:
    get:
      summary: Recent alert events
      description: Returns the most recent alert events across all monitor types.
      operationId: getRecentAlerts
      tags: [Alert Analytics]
      parameters:
        - name: limit
          in: query
          required: false
          schema: {type: integer, default: 20}
      responses:
        '200':
          description: Recent alert events
          content:
            application/json:
              schema:
                type: object
                properties:
                  limit: {type: integer}
                  count: {type: integer}
                  alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp: {type: string}
                        type: {type: string}
                        severity: {type: string}
                        description: {type: string}

  /api/alerts/airquality:
    get:
      summary: Current air quality reading
      description: Latest EPA AirNow AQI data for Crescent City (ZIP 95531).
      operationId: getAirQuality
      tags: [Alerts]
      responses:
        '200':
          description: Air quality report
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp: {type: string, format: date-time}
                  maxAqi: {type: integer}
                  level: {type: string}
                  summary: {type: string}
                  advisory: {type: string, nullable: true}
        '404': {description: No air quality data available}

  /api/alerts/wildfire:
    get:
      summary: Current wildfire report
      description: Active CAL FIRE wildfire incidents in Del Norte and surrounding counties.
      operationId: getWildfireReport
      tags: [Alerts]
      responses:
        '200':
          description: Wildfire report
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp: {type: string, format: date-time}
                  totalIncidents: {type: integer}
                  level: {type: string}
                  summary: {type: string}
        '404': {description: No wildfire data available}

  /api/alerts/marine:
    get:
      summary: Current marine buoy report
      description: Latest NDBC buoy observations for Crescent City marine region (wave height, wind, water temp).
      operationId: getMarineReport
      tags: [Alerts]
      responses:
        '200':
          description: Marine report
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp: {type: string, format: date-time}
                  primaryStation: {type: string}
                  level: {type: string}
                  summary: {type: string}
                  advisory: {type: string, nullable: true}
        '404': {description: No marine data available}

  /api/alerts/composite:
    get:
      summary: Composite 8-monitor alert severity
      description: Aggregated severity assessment across all 8 alert monitors (tsunami, earthquake, weather, tides, fishing, air quality, wildfire, marine).
      operationId: getCompositeSeverity
      tags: [Alerts]
      responses:
        '200':
          description: Composite severity report
          content:
            application/json:
              schema:
                type: object
                properties:
                  level: {type: string, enum: [CALM, WATCH, WARNING, EMERGENCY]}
                  assessedAt: {type: string, format: date-time}
                  reason: {type: string}
        '404': {description: No composite severity data available}

  /api/chat/stream:
    post:
      summary: Streaming RAG chat (SSE)
      description: Server-Sent Events stream for word-by-word RAG answer generation. Sends sources event, token events, and a done event.
      operationId: streamRagChat
      tags: [LLM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                q: {type: string, description: Question to ask}
      responses:
        '200':
          description: SSE stream (text/event-stream)
        '503': {description: Ollama or ChromaDB unavailable}

  /api/fuzzy:
    get:
      summary: Fuzzy search suggestions
      description: Returns typo-tolerant corrections for query terms using Levenshtein edit distance.
      operationId: fuzzySearch
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Fuzzy corrections
          content:
            application/json:
              schema:
                type: object
                properties:
                  original: {type: string}
                  expanded: {type: string}
                  corrections:
                    type: array
                    items:
                      type: object
                      properties:
                        original: {type: string}
                        suggestion: {type: string}
                        score: {type: number}

  /api/report/latest:
    get:
      summary: Latest monthly civic health report
      description: Serves the most recent monthly report from output/reports/ as Markdown.
      operationId: getLatestReport
      tags: [Reporting]
      responses:
        '200':
          description: Monthly report as Markdown
          content:
            text/markdown:
              schema: {type: string}
        '404': {description: No reports generated}

  /api/search/analytics:
    get:
      summary: Search analytics
      description: Returns most-queried search terms aggregated from the search query log.
      operationId: getSearchAnalytics
      tags: [Search]
      responses:
        '200':
          description: Search analytics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalQueries: {type: integer}
                  topTerms:
                    type: array
                    items:
                      type: object
                      properties:
                        term: {type: string}
                        count: {type: integer}

  /api/domains/{id}/coverage:
    get:
      summary: Per-domain coverage metrics
      description: Returns coverage metrics for a single intelligence domain.
      operationId: getDomainCoverage
      tags: [Domains]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
          description: Domain ID (e.g. emergency-management)
      responses:
        '200':
          description: Domain coverage metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain: {type: string}
                  matchedSections: {type: integer}
                  coveragePct: {type: number}
                  totalSections: {type: integer}
        '404': {description: Domain not found}


