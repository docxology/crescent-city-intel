security:
  - apiKey: []
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for accessing protected endpoints
    # Alternative API key in query parameter
    apiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key for accessing protected endpoints (query parameter variant)